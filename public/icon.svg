<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#096dd9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faad14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d48806;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  
  <!-- Book shape -->
  <g transform="translate(256, 256)">
    <!-- Book base -->
    <path d="M-120,-160 L0,-180 L120,-160 L120,160 L0,180 L-120,160 Z" fill="url(#book)" opacity="0.9"/>
    
    <!-- Book spine -->
    <path d="M-20,-175 L0,-180 L20,-175 L20,175 L0,180 L-20,175 Z" fill="#ad6800"/>
    
    <!-- Book pages left -->
    <path d="M-120,-155 L-20,-170 L-20,170 L-120,155 Z" fill="#fff7e6" opacity="0.8"/>
    
    <!-- Book pages right -->
    <path d="M20,-170 L120,-155 L120,155 L20,170 Z" fill="#fff7e6" opacity="0.8"/>
    
    <!-- Pen/Quill -->
    <g transform="translate(80, -80) rotate(45)">
      <path d="M0,0 L10,-80 L20,0 L30,-80 L40,0 L30,120 L20,80 L10,120 Z" fill="#262626"/>
      <path d="M15,-70 L25,-70 L25,70 L15,70 Z" fill="#595959"/>
      <path d="M10,-80 L20,0 L30,-80 L20,-90 Z" fill="#8c8c8c"/>
    </g>
  </g>
  
  <!-- Text lines on book -->
  <g transform="translate(180, 220)" opacity="0.6">
    <rect x="0" y="0" width="80" height="6" rx="3" fill="#262626"/>
    <rect x="0" y="16" width="60" height="6" rx="3" fill="#262626"/>
    <rect x="0" y="32" width="70" height="6" rx="3" fill="#262626"/>
    <rect x="0" y="48" width="50" height="6" rx="3" fill="#262626"/>
  </g>
  
  <g transform="translate(180, 300)" opacity="0.6">
    <rect x="0" y="0" width="70" height="6" rx="3" fill="#262626"/>
    <rect x="0" y="16" width="80" height="6" rx="3" fill="#262626"/>
    <rect x="0" y="32" width="55" height="6" rx="3" fill="#262626"/>
  </g>
</svg>
